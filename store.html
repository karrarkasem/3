<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المتجر — جاري التحميل...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/babil.css" />
  <style>
    /* Store specific overrides */
    :root { --th: #8b5cf6; }
    body { background: var(--bg); color: var(--fg); font-family: 'Cairo', sans-serif; padding-bottom: 80px; }
    
    .store-header { 
      background: linear-gradient(135deg, var(--th), #000); 
      color: #fff; padding: 3rem 1rem; text-align: center; 
      border-radius: 0 0 2rem 2rem; margin-bottom: 2rem;
      position: relative; overflow: hidden;
    }
    .store-logo { 
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover; 
      border: 4px solid rgba(255,255,255,0.2); background: #fff; margin-bottom: 1rem;
    }
    .store-title { font-size: 1.8rem; font-weight: 900; margin-bottom: 0.5rem; }
    .store-info { opacity: 0.9; font-size: 0.9rem; }
    
    .container { max-width: 1100px; margin: 0 auto; padding: 0 1rem; }
    
    .prod-grid { 
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
      gap: 1rem; padding-bottom: 4rem;
    }
    .prod-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 1rem; overflow: hidden; transition: transform 0.2s;
      display: flex; flex-direction: column;
    }
    .prod-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: #eee; }
    .prod-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; }
    .prod-name { font-weight: 700; margin-bottom: 0.5rem; font-size: 1rem; line-height: 1.3; }
    .prod-price { color: var(--th); font-weight: 900; font-size: 1.1rem; margin-top: auto; }
    .prod-btn {
      display: block; width: 100%; padding: 0.6rem; margin-top: 1rem;
      background: var(--surface); color: var(--fg); border: 1px solid var(--border); border-radius: 0.5rem;
      font-family: inherit; font-weight: 700; cursor: pointer; transition: all 0.2s;
    }
    .prod-btn:hover { border-color: var(--th); color: var(--th); }
    .prod-btn.active { background: var(--th); color: #fff; border-color: var(--th); }
    
    /* Cart Floating Button */
    .cart-float {
      position: fixed; bottom: 20px; left: 20px; z-index: 90;
      background: var(--th); color: #fff; padding: 12px 20px;
      border-radius: 50px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      font-weight: 700; transition: transform 0.2s;
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .cart-float:hover { transform: scale(1.05); }
    @keyframes popIn { from{transform:scale(0)} to{transform:scale(1)} }

    /* Cart Modal */
    .cart-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100;
      display: none; backdrop-filter: blur(3px); align-items: flex-end; justify-content: center;
    }
    .cart-modal {
      background: var(--surface); width: 100%; max-width: 500px;
      border-radius: 20px 20px 0 0; padding: 24px;
      max-height: 90vh; overflow-y: auto; box-shadow: 0 -10px 40px rgba(0,0,0,0.4);
      animation: slideUp 0.3s ease;
    }
    @media(min-width: 600px) {
      .cart-overlay { align-items: center; }
      .cart-modal { border-radius: 20px; }
    }
    @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

    .cart-item { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .cart-item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background: #333; }
    .cart-item-info { flex: 1; }
    .cart-item-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
    .cart-item-price { font-size: 0.85rem; color: var(--th); font-weight: 700; }
    .cart-ctrl { display: flex; align-items: center; gap: 8px; background: var(--bg); padding: 4px; border-radius: 8px; }
    .cart-btn-qty { width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
    
    .checkout-form { margin-top: 20px; padding-top: 20px; border-top: 2px dashed var(--border); display: none; }
    .checkout-form.active { display: block; animation: fadeIn 0.3s; }
    .form-input { width: 100%; padding: 12px; margin-bottom: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; color: var(--fg); font-family: inherit; }
    .form-input:focus { border-color: var(--th); outline: none; }
    
    .action-btn { width: 100%; padding: 14px; background: var(--th); color: #fff; border: none; border-radius: 12px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
    .action-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>

<div id="app">
  <div class="store-header">
    <div class="container">
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" id="storeLogo" class="store-logo" style="display:none">
      <h1 class="store-title" id="storeName">جاري التحميل...</h1>
      <p class="store-info" id="storeDesc"></p>
    </div>
  </div>

  <div class="container">
    <div class="prod-grid" id="grid"></div>
  </div>
  
  <!-- Floating Cart -->
  <div class="cart-float" id="cartBtn" style="display:none" onclick="toggleCart()">
    <span>🛒</span>
    <span id="cartTotalQty">0</span>
    <span style="height:15px;width:1px;background:rgba(255,255,255,0.3)"></span>
    <span id="cartTotalPrice">$0.00</span>
  </div>

  <!-- Cart Modal -->
  <div class="cart-overlay" id="cartOverlay" onclick="if(event.target===this) toggleCart()">
    <div class="cart-modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-weight:900;font-size:1.4rem;">سلة المشتريات</h2>
        <button onclick="toggleCart()" style="background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;">&times;</button>
      </div>
      
      <div id="cartItemsList"></div>
      
      <div id="emptyCartMsg" style="text-align:center;padding:40px 0;color:var(--muted);display:none;">
        <div style="font-size:3rem;margin-bottom:10px;">🛒</div>
        <p>السلة فارغة حالياً</p>
      </div>

      <div class="checkout-form" id="checkoutForm">
        <h3 style="font-size:1rem;font-weight:700;margin-bottom:15px;">معلومات التوصيل</h3>
        <input type="text" id="cName" class="form-input" placeholder="الاسم الكريم *" required>
        <input type="tel" id="cPhone" class="form-input" placeholder="رقم الهاتف *" required>
        <input type="text" id="cAddr" class="form-input" placeholder="العنوان بالتفصيل">
        <button class="action-btn" id="submitBtn" onclick="submitOrder()">✅ إرسال الطلب</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import './js/firebase.js';

  let tenantId = null;
  let products = [];
  let cart = [];

  async function initStore() {
    const params = new URLSearchParams(location.search);
    tenantId = params.get('id');
    
    if (!tenantId) {
      document.body.innerHTML = '<div style="text-align:center;padding:5rem">⚠️ رابط المتجر غير صحيح</div>';
      return;
    }

    // Load Cart from LocalStorage
    try {
      const saved = localStorage.getItem(`babil_cart_${tenantId}`);
      if (saved) cart = JSON.parse(saved);
    } catch(e) {}

    try {
      await window.waitForFb();
      const db = window._db;
      const { doc, getDoc, collection, getDocs } = window._fb;

      // 1. Get Tenant Info
      const tSnap = await getDoc(doc(db, 'tenants', tenantId));
      if (!tSnap.exists()) {
        document.body.innerHTML = '<div style="text-align:center;padding:5rem">⚠️ المتجر غير موجود</div>';
        return;
      }
      
      const tData = tSnap.data();
      
      // Apply Theme
      const colors = {
        violet: '#8b5cf6', teal: '#14b8a6', sky: '#0ea5e9', 
        indigo: '#6366f1', rose: '#f43f5e', orange: '#f97316'
      };
      if (tData.theme?.color) {
        document.documentElement.style.setProperty('--th', colors[tData.theme.color] || tData.theme.color);
      }
      if (tData.theme?.mode === 'dark') {
        document.body.style.background = '#0f0a1e';
        document.body.style.color = '#fff';
      }

      // Render Header
      document.title = tData.nameAr || 'المتجر';
      document.getElementById('storeName').textContent = tData.nameAr;
      document.getElementById('storeDesc').textContent = tData.address || '';
      
      if (tData.logoUrl) {
        const logo = document.getElementById('storeLogo');
        logo.src = tData.logoUrl;
        logo.style.display = 'inline-block';
      }

      // 2. Get Products
      const pSnap = await getDocs(collection(db, `tenants/${tenantId}/products`));
      
      if (pSnap.empty) {
        document.getElementById('grid').innerHTML = '<p style="grid-column:1/-1;text-align:center;opacity:0.6">لا توجد منتجات حالياً</p>';
        return;
      }

      products = pSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderProducts();
      updateCartUI();

    } catch (e) {
      console.error(e);
      document.body.innerHTML = '<div style="text-align:center;padding:5rem">حدث خطأ في تحميل المتجر</div>';
    }
  }

  function renderProducts() {
    const grid = document.getElementById('grid');
    grid.innerHTML = products.map(p => {
      const inCart = cart.find(c => c.id === p.id);
      
      // Render custom tags based on data
      let tags = '';
      if (p.customData) {
        if (p.customData.sizes) tags += `<div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">📏 ${p.customData.sizes}</div>`;
        if (p.customData.calories) tags += `<div style="font-size:0.7rem;color:var(--muted);margin-bottom:4px">🔥 ${p.customData.calories} سعرة</div>`;
      }

      return `
        <div class="prod-card">
          <img src="${p.img || 'https://via.placeholder.com/200?text=📦'}" class="prod-img" loading="lazy">
          <div class="prod-body">
            <div class="prod-name">${p.name}</div>
            ${tags}
            <div class="prod-price">$${Number(p.price).toFixed(2)}</div>
            <button class="prod-btn ${inCart ? 'active' : ''}" onclick="addToCart('${p.id}')">
              ${inCart ? 'مضاف للسلة ✓' : 'أضف للسلة'}
            </button>
          </div>
        </div>
      `;
    }).join('');
  }

  window.addToCart = function(pid) {
    const prod = products.find(p => p.id === pid);
    const existing = cart.find(c => c.id === pid);
    
    if (existing) {
      existing.qty++;
    } else {
      cart.push({ ...prod, qty: 1 });
    }
    
    saveCart();
    renderProducts();
    updateCartUI();
    
    // Animate button
    const floatBtn = document.getElementById('cartBtn');
    floatBtn.style.transform = 'scale(1.2)';
    setTimeout(() => floatBtn.style.transform = 'scale(1)', 200);
  };

  window.removeFromCart = function(pid) {
    cart = cart.filter(c => c.id !== pid);
    saveCart();
    renderProducts();
    updateCartUI();
    renderCartItems();
  };

  window.updateQty = function(pid, change) {
    const item = cart.find(c => c.id === pid);
    if (item) {
      item.qty += change;
      if (item.qty <= 0) {
        removeFromCart(pid);
        return;
      }
    }
    saveCart();
    updateCartUI();
    renderCartItems();
  };

  window.toggleCart = function() {
    const overlay = document.getElementById('cartOverlay');
    const isVisible = overlay.style.display === 'flex';
    
    if (!isVisible) {
      overlay.style.display = 'flex';
      renderCartItems();
    } else {
      overlay.style.display = 'none';
    }
  };

  function renderCartItems() {
    const list = document.getElementById('cartItemsList');
    const form = document.getElementById('checkoutForm');
    const empty = document.getElementById('emptyCartMsg');
    
    if (cart.length === 0) {
      list.innerHTML = '';
      form.style.display = 'none';
      empty.style.display = 'block';
      return;
    }
    
    empty.style.display = 'none';
    form.style.display = 'block';
    
    list.innerHTML = cart.map(item => `
      <div class="cart-item">
        <img src="${item.img || 'https://via.placeholder.com/50'}" class="cart-item-img">
        <div class="cart-item-info">
          <div class="cart-item-title">${item.name}</div>
          <div class="cart-item-price">$${(item.price * item.qty).toFixed(2)}</div>
        </div>
        <div class="cart-ctrl">
          <div class="cart-btn-qty" onclick="updateQty('${item.id}', -1)">-</div>
          <span style="font-weight:700;font-size:0.9rem;min-width:20px;text-align:center">${item.qty}</span>
          <div class="cart-btn-qty" onclick="updateQty('${item.id}', 1)">+</div>
        </div>
      </div>
    `).join('') + `
      <div style="display:flex;justify-content:space-between;font-weight:900;font-size:1.1rem;margin-top:20px;padding-top:15px;border-top:1px solid var(--border)">
        <span>الإجمالي</span>
        <span>$${cart.reduce((sum, i) => sum + (i.price * i.qty), 0).toFixed(2)}</span>
      </div>
    `;
  }

  function updateCartUI() {
    const totalQty = cart.reduce((sum, i) => sum + i.qty, 0);
    const totalPrice = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
    
    const btn = document.getElementById('cartBtn');
    if (totalQty > 0) {
      btn.style.display = 'flex';
      document.getElementById('cartTotalQty').textContent = totalQty;
      document.getElementById('cartTotalPrice').textContent = '$' + totalPrice.toFixed(2);
    } else {
      btn.style.display = 'none';
    }
  }

  function saveCart() {
    localStorage.setItem(`babil_cart_${tenantId}`, JSON.stringify(cart));
  }

  window.submitOrder = async function() {
    const name = document.getElementById('cName').value.trim();
    const phone = document.getElementById('cPhone').value.trim();
    const addr = document.getElementById('cAddr').value.trim();
    
    if (!name || !phone) {
      alert('يرجى إدخال الاسم ورقم الهاتف لإكمال الطلب');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ جاري الإرسال...';

    try {
      const db = window._db;
      const { addDoc, collection, serverTimestamp } = window._fb;
      
      const total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
      
      await addDoc(collection(db, `tenants/${tenantId}/orders`), {
        customerName: name,
        customerPhone: phone,
        address: addr,
        items: cart.map(c => ({ id: c.id, name: c.name, price: c.price, qty: c.qty })),
        total: total,
        status: 'pending',
        tenantId: tenantId, // Important for security rule
        createdAt: serverTimestamp()
      });

      // Clear Cart
      cart = [];
      saveCart();
      updateCartUI();
      toggleCart();
      
      alert('✅ تم إرسال طلبك بنجاح! شكراً لتعاملك معنا.');
      
      // Reset Form
      document.getElementById('cName').value = '';
      document.getElementById('cPhone').value = '';
      
    } catch (e) {
      console.error(e);
      alert('حدث خطأ أثناء إرسال الطلب. يرجى المحاولة مرة أخرى.');
    } finally {
      btn.disabled = false;
      btn.textContent = '✅ إرسال الطلب';
    }
  };

  initStore();
</script>
</body>
</html>
