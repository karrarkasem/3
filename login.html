<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — منصة بابل</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/babil.css" />
</head>
<body>

<nav class="bbl-nav">
  <div class="bbl-nav-inner">
    <a href="index.html" class="bbl-logo">🏛️ بابل</a>
    <div class="bbl-nav-links">
      <span style="font-size:.85rem;color:var(--muted);">ليس لديك حساب؟</span>
      <a href="register.html" class="bbl-btn bbl-btn-primary bbl-btn-sm">سجّل مجاناً</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.5rem;margin-bottom:.5rem;">🔐</div>
      <h2 style="font-size:1.5rem;font-weight:900;margin-bottom:.25rem;">تسجيل الدخول</h2>
      <p style="color:var(--muted);font-size:.88rem;">أدخل البريد الإلكتروني وكلمة المرور</p>
    </div>

    <!-- Login form -->
    <div id="formLogin">
      <form id="loginForm" novalidate>
        <div class="bbl-field">
          <label>البريد الإلكتروني</label>
          <input type="email" id="loginEmail" placeholder="example@domain.com" autocomplete="email" />
        </div>
        <div class="bbl-field">
          <label>كلمة المرور</label>
          <div style="position:relative;">
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" style="padding-left:2.5rem;" />
            <button type="button" id="togglePwd" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0;">👁️</button>
          </div>
        </div>

        <div style="text-align:left;margin-bottom:1rem;">
          <a id="forgotLink" href="#" style="font-size:.82rem;color:var(--accent);text-decoration:none;">نسيت كلمة المرور؟</a>
        </div>

        <div id="loginError" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:.6rem;padding:.75rem 1rem;font-size:.85rem;color:#f87171;margin-bottom:1rem;"></div>

        <button type="submit" id="loginBtn" class="bbl-btn-primary" style="width:100%;padding:.8rem;font-size:1rem;border-radius:.7rem;">
          <span id="loginBtnText">دخول</span>
        </button>
      </form>
    </div>

    <!-- Reset password form -->
    <div id="formReset" style="display:none;">
      <p style="color:var(--muted);font-size:.88rem;margin-bottom:1.5rem;">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
      <div class="bbl-field">
        <label>البريد الإلكتروني</label>
        <input type="email" id="resetEmail" placeholder="example@domain.com" />
      </div>
      <div id="resetMsg" style="display:none;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);border-radius:.6rem;padding:.75rem 1rem;font-size:.85rem;color:#10b981;margin-bottom:1rem;"></div>
      <div id="resetErr" style="display:none;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);border-radius:.6rem;padding:.75rem 1rem;font-size:.85rem;color:#f87171;margin-bottom:1rem;"></div>
      <div style="display:flex;gap:.75rem;">
        <button class="bbl-btn-ghost" style="flex:1;padding:.7rem;border-radius:.6rem;" onclick="showLoginForm()">رجوع</button>
        <button class="bbl-btn-primary" style="flex:2;padding:.7rem;border-radius:.6rem;" onclick="sendReset()">إرسال الرابط</button>
      </div>
    </div>

    <div style="text-align:center;margin-top:1.5rem;font-size:.85rem;color:var(--muted);">
      ليس لديك حساب؟ <a href="register.html" style="color:var(--accent);text-decoration:none;font-weight:600;">سجّل الآن مجاناً</a>
    </div>
  </div>
</div>

<div class="toast-stack" id="toastStack"></div>

<script type="module">
  import './js/firebase.js';
  import './js/auth.js';

  window.redirectIfAuth();

  const loginForm  = document.getElementById('loginForm');
  const emailI     = document.getElementById('loginEmail');
  const passwordI  = document.getElementById('loginPassword');
  const loginBtn   = document.getElementById('loginBtn');
  const loginErr   = document.getElementById('loginError');
  const togglePwd  = document.getElementById('togglePwd');

  togglePwd.addEventListener('click', () => {
    const isPass = passwordI.type === 'password';
    passwordI.type = isPass ? 'text' : 'password';
    togglePwd.textContent = isPass ? '🙈' : '👁️';
  });

  document.getElementById('forgotLink').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('formLogin').style.display = 'none';
    document.getElementById('formReset').style.display = 'block';
    document.getElementById('resetEmail').value = emailI.value;
  });

  window.showLoginForm = function() {
    document.getElementById('formReset').style.display = 'none';
    document.getElementById('formLogin').style.display = 'block';
  };

  window.sendReset = async function() {
    const email = document.getElementById('resetEmail').value.trim();
    const msgEl = document.getElementById('resetMsg');
    const errEl = document.getElementById('resetErr');
    msgEl.style.display = 'none';
    errEl.style.display = 'none';

    if (!email) { errEl.textContent = 'يرجى إدخال البريد الإلكتروني'; errEl.style.display = 'block'; return; }

    try {
      await window.resetPassword(email);
      msgEl.textContent = 'تم إرسال رابط إعادة التعيين. تحقق من بريدك الإلكتروني.';
      msgEl.style.display = 'block';
    } catch (err) {
      errEl.textContent = 'البريد غير موجود أو حدث خطأ.';
      errEl.style.display = 'block';
    }
  };

  function showError(msg) { loginErr.textContent = msg; loginErr.style.display = 'block'; }
  function hideError()    { loginErr.style.display = 'none'; }
  function setLoading(on) {
    loginBtn.disabled = on;
    document.getElementById('loginBtnText').textContent = on ? 'جارٍ التحقق...' : 'دخول';
  }

  loginForm.addEventListener('submit', async e => {
    e.preventDefault();
    hideError();

    const email    = emailI.value.trim();
    const password = passwordI.value;

    if (!email || !password) { showError('يرجى إدخال البريد الإلكتروني وكلمة المرور'); return; }

    setLoading(true);

    try {
      // Firebase Authentication
      const cred = await window.loginWithEmail(email, password);
      const uid  = cred.user.uid;

      // Load tenant data
      await window.waitForFb();
      const db = window._db;
      const { doc, getDoc } = window._fb;

      const tenantSnap = await getDoc(doc(db, 'tenants', uid));
      if (!tenantSnap.exists()) {
        showError('لم يتم العثور على بيانات الحساب.');
        await window._fbAuth.signOut(window._auth);
        setLoading(false);
        return;
      }

      const tenantData = tenantSnap.data();

      // Check subscription not cancelled
      const subSnap = await getDoc(doc(db, 'subscriptions', uid));
      if (subSnap.exists() && subSnap.data().status === 'cancelled') {
        showError('الاشتراك منتهي. يرجى تجديد اشتراكك.');
        await window._fbAuth.signOut(window._auth);
        setLoading(false);
        return;
      }

      // Check trial expiry
      if (subSnap.exists()) {
        const sub = subSnap.data();
        if (sub.plan === 'trial' && sub.trialEnd) {
          const trialEndDate = sub.trialEnd.toDate();
          if (new Date() > trialEndDate) {
            showError('انتهت فترة التجربة المجانية. يرجى الترقية إلى خطة مدفوعة.');
            await window._fbAuth.signOut(window._auth);
            setLoading(false);
            return;
          }
        }
      }

      window.saveSession(uid, tenantData);
      location.replace('dashboard.html');

    } catch (err) {
      console.error(err);
      const code = err.code;
      if (code === 'auth/invalid-credential' || code === 'auth/wrong-password' || code === 'auth/user-not-found') {
        showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
      } else if (code === 'auth/too-many-requests') {
        showError('تم تجاوز عدد المحاولات. حاول لاحقاً.');
      } else {
        showError('حدث خطأ أثناء تسجيل الدخول. حاول مرة أخرى.');
      }
      setLoading(false);
    }
  });
</script>
</body>
</html>
